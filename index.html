<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monika</title>

<style>
body{
    margin:0;
    background:#d9efff;
    font-family:Arial,Helvetica,sans-serif;
}

#room{
    width:900px;
    max-width:95%;
    margin:30px auto;
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

#monika{
    display:block;
    margin:auto;
    max-height:350px;
}

#chatLog{
    height:280px;
    overflow-y:auto;
    border:1px solid #ddd;
    border-radius:15px;
    padding:15px;
    background:#fafafa;
    margin-top:20px;
}

.user{
    text-align:right;
    margin:10px;
    color:#2563eb;
}

.monika{
    text-align:left;
    margin:10px;
    color:#16a34a;
}

#inputArea{
    display:flex;
    margin-top:20px;
    gap:10px;
}

#userInput{
    flex:1;
    padding:12px;
    border-radius:12px;
    border:1px solid #bbb;
    font-size:16px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:12px;
    background:#8b8cff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#7273ff;
}
</style>

</head>

<body>

<div id="room">

<img id="monika" src="monika.png">

<div id="chatLog">
<div class="monika"><b>Monika:</b> Hi! I'm Monika 💚</div>
</div>

<div id="inputArea">
<input
id="userInput"
type="text"
placeholder="Say something to Monika..."
>

<button onclick="talk()">Send</button>

</div>

</div>

<script>

const replies=[

"Hi again! 💚",

"I'm really happy you're here.",

"I've been thinking about writing another poem.",

"I wonder what you're’re doing today.",

"Thanks for spending time with me.",

"Sometimes I like watching the clouds.",

"I hope you're taking care of yourself. 🌸",

"I'd love to hear more about that.",

"That made me smile.",

"Tell me more."

];

function talk(){

const input=document.getElementById("userInput");

const chat=document.getElementById("chatLog");

const text=input.value.trim();

if(text==="") return;

chat.innerHTML+=`<div class="user"><b>You:</b> ${text}</div>`;

input.value="";

chat.scrollTop=chat.scrollHeight;

const reply=replies[Math.floor(Math.random()*replies.length)];

setTimeout(()=>{

chat.innerHTML+=`<div class="monika"><b>Monika:</b> ${reply}</div>`;

chat.scrollTop=chat.scrollHeight;

},600);

}

document.getElementById("userInput").addEventListener("keydown",function(e){

if(e.key==="Enter"){

talk();

}

});

</script>

</body>
</html>
