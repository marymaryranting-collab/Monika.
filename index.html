<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Monika After Story (Web)</title>

<style>
body{
    margin:0;
    background:#bfe7ff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

#room{
    width:900px;
    height:500px;
    background:white;
    border-radius:20px;
    position:relative;
    overflow:hidden;
}

#background{
    position:absolute;
    inset:0;
    background:linear-gradient(#dff4ff,#fff7db);
}

#monika{
    position:absolute;
    bottom:60px;
    left:50%;
    transform:translateX(-50%);
    height:380px;
}

#textbox{
    position:absolute;
    left:20px;
    right:20px;
    bottom:20px;

    background:white;
    border-radius:15px;

    padding:15px;

    font-size:20px;
}
</style>

</head>

<body>

<div id="room">

<div id="background"></div>

<img
id="monika"
src="https://static.wikia.nocookie.net/doki-doki-literature-club/images/f/f2/Monika_Forward.png"
/>

<div id="textbox">
Hi! I'm Monika! 💚
</div>

</div>

</body>
</html>
