<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Monika After Story (Web)</title>

<style>
body{
    margin:0;
    background:#bfe7ff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

#room{
    width:900px;
    height:500px;
    background:white;
    border-radius:20px;
    position:relative;
    overflow:hidden;
}

#background{
    position:absolute;
    inset:0;
    background:linear-gradient(#dff4ff,#fff7db);
}

#monika{
    position:absolute;
    bottom:60px;
    left:50%;
    transform:translateX(-50%);
    height:380px;
}

#textbox{

    position:absolute;
    left:20px;
    right:20px;
    bottom:20px;

    background:white;
    border-radius:15px;

    padding:15px;

    font-size:20px;

}   /* <-- THIS was missing */

#talkButton{

    position:absolute;

    bottom:90px;

    right:20px;

    padding:12px 22px;

    font-size:18px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    background:#72d67b;

    color:white;

}
</style>

</head>

<body>

<div id="room">

<div id="background"></div>

<img
id="monika"
src="https://static.wikia.nocookie.net/doki-doki-literature-club/images/f/f2/Monika_Forward.png"
/>

<div id="textbox">
    <span id="dialogue">
        Hi! I'm Monika! 💚
    </span>
</div>
    <button id="talkButton" onclick="talk()">
Talk
</button>
</div>
<script>

const dialogue = document.getElementById("dialogue");

const lines = [

"Hi again! 💚",

"I'm really happy you're here.",

"I've been thinking about writing another poem.",

"I wonder what you're doing today.",

"Thanks for spending time with me.",

"Sometimes I like just watching the clouds.",

"I hope you're taking care of yourself. 🌸"

];

function talk(){

const random = Math.floor(Math.random() * lines.length);

dialogue.textContent = lines[random];

}

</script>
</body>
</html>
