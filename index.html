<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Monika After Story (Web)</title>

<style>
body{
    margin:0;
    background:#bfe7ff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

#room{
    width:900px;
    height:500px;
    background:white;
    border-radius:20px;
    position:relative;
    overflow:hidden;
}

#background{
    position:absolute;
    inset:0;
    background:
        radial-gradient(circle at top, #ffffff 0%, #dff4ff 50%, #b8dff7 100%);
}

#monika{
    position:absolute;
    bottom:60px;
    left:50%;
    transform:translateX(-50%);
    height:380px;
}

#textbox{
    position:absolute;
    left:20px;
    right:20px;
    bottom:20px;

    background:rgba(255,255,255,0.95);
    border-radius:15px;
    padding:18px;

    font-size:22px;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

#talkButton{
    position:absolute;
    bottom:120px;
    right:20px;

    padding:12px 24px;
    font-size:18px;

    border:none;
    border-radius:12px;

    background:#6d83c9;
    color:white;

    cursor:pointer;
    transition:0.2s;
}

#talkButton:hover{
    background:#8799d9;
    transform:scale(1.05);
}
</style>

</head>

<body>

<div id="room">

<div id="background"></div>

<img
id="monika"
src="monika.png"
/>

<div id="textbox">
    <span id="dialogue">
        Hi! I'm Monika! 💚
    </span>
</div>
    <button id="talkButton" onclick="talk()">
Talk
</button>
</div>
<script>

const dialogue = document.getElementById("dialogue");

const lines = [

"Hi again! 💚",

"I'm really happy you're here.",

"I've been thinking about writing another poem.",

"I wonder what you're doing today.",

"Thanks for spending time with me.",

"Sometimes I like just watching the clouds.",

"I hope you're taking care of yourself. 🌸"

];

function talk(){

const random = Math.floor(Math.random() * lines.length);

let i = 0;
dialogue.textContent = "";

const text = lines[random];

const typing = setInterval(() => {
    dialogue.textContent += text[i];
    i++;

    if (i >= text.length) {
        clearInterval(typing);
    }
}, 35);

</script>
</body>
</html>
